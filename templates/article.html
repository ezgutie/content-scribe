<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} · NOUD Blog</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="canonical" href="https://noud.es/blog/{{SLUG}}/">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:url" content="https://noud.es/blog/{{SLUG}}/">
  <meta property="og:site_name" content="NOUD">
  <meta property="og:locale" content="es_ES">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{META_DESCRIPTION}}">

  <!-- Schema.org Article -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{TITLE}}",
    "description": "{{META_DESCRIPTION}}",
    "datePublished": "{{DATE_ISO}}",
    "dateModified": "{{DATE_ISO}}",
    "author": {
      "@type": "Organization",
      "name": "NOUD",
      "url": "https://noud.es"
    },
    "publisher": {
      "@type": "Organization",
      "name": "NOUD",
      "url": "https://noud.es"
    },
    "mainEntityOfPage": "https://noud.es/blog/{{SLUG}}/"
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000000;
      --dark: #050505;
      --gray-900: #0a0a0a;
      --gray-800: #141414;
      --gray-700: #1f1f1f;
      --gray-600: #2a2a2a;
      --gray-500: #404040;
      --gray-400: #737373;
      --gray-300: #a3a3a3;
      --gray-200: #d4d4d4;
      --white: #fafafa;
      --accent: #10b981;
      --accent-light: #34d399;
      --accent-glow: rgba(16, 185, 129, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--dark);
      color: var(--gray-300);
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::selection { background: var(--accent); color: var(--white); }
    a { color: var(--accent-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .wrapper { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

    /* Header */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 0;
      background: rgba(5, 5, 5, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    header .wrapper { display: flex; justify-content: space-between; align-items: center; }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 20px; letter-spacing: 1px; color: var(--accent);
      text-decoration: none;
    }
    .logo-icon { width: 28px; height: 28px; color: var(--accent); }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--white); transition: color 0.2s; text-decoration: none; }
    .nav-links a:hover { color: var(--accent-light); text-decoration: none; }
    .nav-btn {
      background: var(--accent); color: var(--black) !important;
      padding: 10px 22px; border-radius: 8px;
      font-size: 13px; font-weight: 600; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--accent-light); text-decoration: none; }

    /* Article */
    .article-hero {
      padding: 160px 0 60px;
      max-width: 760px;
      margin: 0 auto;
    }
    .article-tag {
      display: inline-flex; align-items: center;
      background: var(--accent-glow);
      color: var(--accent-light);
      padding: 6px 14px; border-radius: 100px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 24px;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .article-hero h1 {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 700; color: var(--white);
      letter-spacing: -0.02em; line-height: 1.2;
      margin-bottom: 16px;
    }
    .article-meta {
      font-size: 13px; color: var(--gray-400);
      display: flex; gap: 16px; align-items: center;
    }
    .article-meta span { display: flex; align-items: center; gap: 4px; }

    /* Article body */
    .article-body {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 32px 100px;
    }
    .article-body h2 {
      font-size: 24px; font-weight: 600; color: var(--white);
      margin: 48px 0 16px; letter-spacing: -0.01em;
    }
    .article-body h3 {
      font-size: 18px; font-weight: 600; color: var(--white);
      margin: 32px 0 12px;
    }
    .article-body p {
      margin-bottom: 20px;
      color: var(--gray-300);
    }
    .article-body ul, .article-body ol {
      margin: 0 0 20px 24px;
      color: var(--gray-300);
    }
    .article-body li { margin-bottom: 8px; }
    .article-body strong { color: var(--white); }
    .article-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 16px 24px;
      margin: 24px 0;
      background: var(--gray-900);
      border-radius: 0 12px 12px 0;
      color: var(--gray-200);
      font-style: italic;
    }
    .article-body code {
      background: var(--gray-800);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--accent-light);
    }
    .article-body pre {
      background: var(--gray-900);
      border: 1px solid var(--gray-700);
      border-radius: 12px;
      padding: 24px;
      overflow-x: auto;
      margin: 24px 0;
    }
    .article-body pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      color: var(--gray-200);
    }

    /* Back link */
    .back-link {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 32px 60px;
    }
    .back-link a {
      font-size: 14px; color: var(--accent-light);
      display: inline-flex; align-items: center; gap: 6px;
    }

    /* Footer */
    footer {
      padding: 40px 0;
      border-top: 1px solid var(--gray-800);
    }
    footer .wrapper { display: flex; justify-content: space-between; align-items: center; }
    .footer-left { display: flex; align-items: center; gap: 24px; }
    .footer-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 18px; color: var(--accent);
    }
    .footer-logo .logo-icon { width: 24px; height: 24px; }
    footer p { color: var(--gray-500); font-size: 13px; }
    footer a { color: var(--gray-500); text-decoration: none; }

    @media (max-width: 900px) {
      .nav-links a:not(.nav-btn) { display: none; }
    }
    @media (max-width: 600px) {
      .wrapper { padding: 0 20px; }
      .article-hero { padding: 120px 20px 40px; }
      .article-body { padding: 0 20px 80px; }
      .back-link { padding: 0 20px 40px; }
      footer .wrapper { flex-direction: column; gap: 16px; text-align: center; }
      .footer-left { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrapper">
      <a href="/" class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="3" fill="currentColor"/>
          <circle cx="24" cy="8" r="3" fill="currentColor"/>
          <circle cx="16" cy="24" r="4" fill="currentColor"/>
          <line x1="10" y1="10" x2="14" y2="21" stroke="currentColor" stroke-width="2"/>
          <line x1="22" y1="10" x2="18" y2="21" stroke="currentColor" stroke-width="2"/>
          <line x1="11" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>NOUD</span>
      </a>
      <nav class="nav-links">
        <a href="/">Inicio</a>
        <a href="/blog/">Blog</a>
        <a href="/#contacto" class="nav-btn">Contactar</a>
      </nav>
    </div>
  </header>

  <div class="article-hero">
    <span class="article-tag">{{TAG}}</span>
    <h1>{{TITLE}}</h1>
    <div class="article-meta">
      <span>📅 {{DATE_DISPLAY}}</span>
      <span>⏱ {{READ_TIME}} min de lectura</span>
    </div>
  </div>

  <article class="article-body">
    {{CONTENT}}
  </article>

  <div class="back-link">
    <a href="/blog/">← Volver al blog</a>
  </div>

  <footer>
    <div class="wrapper">
      <div class="footer-left">
        <div class="footer-logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="3" fill="currentColor"/>
            <circle cx="24" cy="8" r="3" fill="currentColor"/>
            <circle cx="16" cy="24" r="4" fill="currentColor"/>
            <line x1="10" y1="10" x2="14" y2="21" stroke="currentColor" stroke-width="2"/>
            <line x1="22" y1="10" x2="18" y2="21" stroke="currentColor" stroke-width="2"/>
            <line x1="11" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>NOUD</span>
        </div>
        <p>© 2026 NOUD · <a href="/legal/">Aviso Legal</a></p>
      </div>
    </div>
  </footer>

</body>
</html>
